<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Verification Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #000; color: white; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }

        /* --- 1. SETUP FORM (Initial Screen) --- */
        #setup-form {
            background: #111;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
            width: 350px;
            z-index: 100;
            text-align: center;
        }
        #setup-form h2 { margin-bottom: 20px; font-size: 18px; color: #fe2c55; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #222;
            color: white;
            outline: none;
        }
        .btn-start {
            width: 100%;
            padding: 12px;
            background: #fe2c55;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* --- 2. TIKTOK PROFILE (Background) --- */
        #tiktok-profile {
            display: none; /* Hidden at start */
            width: 100%;
            max-width: 450px;
            text-align: center;
            flex-direction: column;
            align-items: center;
        }
        #p-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #333;
            object-fit: cover;
            margin-bottom: 15px;
            border: 2px solid #222;
        }
        .user-row { display: flex; align-items: center; justify-content: center; gap: 6px; }
        #p-user { font-size: 22px; font-weight: bold; }
        
        .blue-badge {
            width: 20px;
            height: 20px;
            background: #20d5ec;
            border-radius: 50%;
            display: none; /* Hidden until success */
            justify-content: center;
            align-items: center;
            font-size: 11px;
            color: black;
            animation: popBadge 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popBadge { from { transform: scale(0); } to { transform: scale(1); } }

        .stats { display: flex; gap: 25px; margin: 20px 0; }
        .stat-item span { display: block; }
        .stat-val { font-weight: bold; font-size: 18px; }
        .stat-lbl { color: #888; font-size: 13px; }

        /* --- 3. LOADING WINDOW (The "Leading") --- */
        #loading-overlay {
            display: none;
            position: absolute;
            width: 380px;
            background: rgba(15, 15, 15, 0.98);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            z-index: 50;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #222;
            border-top: 4px solid #20d5ec;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="setup-form">
        <h2>Account Setup</h2>
        <input type="text" id="in-user" placeholder="Username (e.g. @rex_edit)">
        <input type="text" id="in-followers" placeholder="Followers (e.g. 14.5K)">
        <input type="text" id="in-img" placeholder="Profile Image URL">
        <button class="btn-start" onclick="startVerification()">Verify Account</button>
    </div>

    <div id="tiktok-profile">
        <img id="p-img" src="" alt="">
        <div class="user-row">
            <span id="p-user">@username</span>
            <div class="blue-badge" id="v-badge">✓</div>
        </div>
        <div class="stats">
            <div class="stat-item"><span class="stat-val" id="p-follow">0</span><span class="stat-lbl">Following</span></div>
            <div class="stat-item"><span class="stat-val" id="p-followers">0</span><span class="stat-lbl">Followers</span></div>
            <div class="stat-item"><span class="stat-val">1.2M</span><span class="stat-lbl">Likes</span></div>
        </div>
    </div>

    <div id="loading-overlay">
        <h3 id="load-msg">Initializing Verification...</h3>
        <div class="spinner"></div>
        <p id="percent">0%</p>
    </div>

    <script>
        function startVerification() {
            // Get inputs
            const user = document.getElementById('in-user').value || "@user";
            const followers = document.getElementById('in-followers').value || "0";
            const imgUrl = document.getElementById('in-img').value || "https://www.w3schools.com/howto/img_avatar.png";

            // Set profile data
            document.getElementById('p-user').innerText = user;
            document.getElementById('p-followers').innerText = followers;
            document.getElementById('p-img').src = imgUrl;

            // Transition: Hide form, Show Profile (blurred)
            document.getElementById('setup-form').style.display = 'none';
            const profile = document.getElementById('tiktok-profile');
            profile.style.display = 'flex';
            profile.style.filter = 'blur(5px)';

            // Show Loading Overlay
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'block';

            // Animation Logic
            let count = 0;
            const percentEl = document.getElementById('percent');
            const loadMsg = document.getElementById('load-msg');

            const interval = setInterval(() => {
                count += Math.floor(Math.random() * 6) + 1;
                
                if(count > 40) loadMsg.innerText = "Checking authenticity...";
                if(count > 80) loadMsg.innerText = "Injecting Blue Badge...";

                if (count >= 100) {
                    count = 100;
                    clearInterval(interval);
                    
                    // Final Success
                    setTimeout(() => {
                        overlay.style.display = 'none'; // Window gone
                        profile.style.filter = 'none'; // Unblur
                        document.getElementById('v-badge').style.display = 'flex'; // Badge ON
                    }, 800);
                }
                percentEl.innerText = count + "%";
            }, 120);
        }
    </script>
</body>
</html>
