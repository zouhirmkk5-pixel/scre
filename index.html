<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Verify Tool Overlay</title>
    <style>
        /* CSS Settings */
        body {
            background-color: #00ff00; /* Green Screen for Editing */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .verify-window {
            width: 420px;
            background: rgba(18, 18, 18, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            color: white;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .window-header {
            background: #1a1a1a;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .window-controls {
            display: flex;
            gap: 6px;
        }

        .window-controls span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #333;
        }

        .window-content {
            padding: 45px 25px;
            text-align: center;
        }

        h2 {
            font-size: 19px;
            font-weight: 500;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        /* Spinner & Progress */
        .loader-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .spinner {
            width: 55px;
            height: 55px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #00f2ea; /* TikTok Theme Color */
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #progress-text {
            font-size: 14px;
            color: #aaa;
        }

        #percent {
            font-weight: bold;
            color: #fff;
        }

        /* Success State */
        .success-box {
            display: none;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .check-circle {
            width: 65px;
            height: 65px;
            background: #2ecc71;
            color: white;
            font-size: 35px;
            line-height: 65px;
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.4);
        }

        .success-title {
            color: #fff;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="verify-window">
        <div class="window-header">
            <span>Venix TikTok Verify Tool</span>
            <div class="window-controls">
                <span></span><span></span><span></span>
            </div>
        </div>
        
        <div class="window-content">
            <div id="processing-ui">
                <h2>Processing verification for @ew...</h2>
                <div class="loader-box">
                    <div class="spinner"></div>
                    <p id="progress-text">Processing verification... <span id="percent">0%</span></p>
                </div>
            </div>

            <div id="success-ui" class="success-box">
                <div class="check-circle">✓</div>
                <h2 class="success-title">Successfully verified @ew</h2>
            </div>
        </div>
    </div>

    <script>
        const percentEl = document.getElementById('percent');
        const processingUI = document.getElementById('processing-ui');
        const successUI = document.getElementById('success-ui');
        
        let count = 0;

        // Speed of the loading (150ms)
        const loadingInterval = setInterval(() => {
            // Random jumps for realism
            count += Math.floor(Math.random() * 7) + 1;

            if (count >= 100) {
                count = 100;
                clearInterval(loadingInterval);
                
                // Delay before showing success
                setTimeout(() => {
                    processingUI.style.display = 'none';
                    successUI.style.display = 'block';
                }, 600);
            }
            
            percentEl.innerText = count + "%";
        }, 150);
    </script>
</body>
</html>
