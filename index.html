<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Official Profile</title>
    <style>
        /* Importer des polices qui ressemblent à TikTok Sans */
        @import url('https://fonts.cdnfonts.com/css/sf-pro-display');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, sans-serif; }
        
        body { background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        /* iPhone Frame Precise */
        .app-container {
            width: 393px; /* Exact iPhone 14 Pro width */
            height: 852px;
            background: #000;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Status Bar Mockup (Precise Icons) */
        .status-bar {
            height: 44px;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            font-weight: 600;
        }

        /* Header Nav */
        .header {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            align-items: center;
        }
        .header svg { width: 24px; height: 24px; fill: white; }

        /* Profile Section */
        .profile-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }

        .avatar-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 12px;
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 0.5px solid #333;
        }
        .blue-plus {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: #00f2ea;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .name-container { display: flex; align-items: center; gap: 4px; margin-top: 5px; }
        .display-name { font-size: 18px; font-weight: 700; color: #fff; }
        .username { font-size: 14px; font-weight: 500; margin-top: 5px; }
        
        /* THE VERIFIED BADGE (Exact TikTok Blue) */
        .verified-badge {
            width: 16px;
            height: 16px;
            background: #20d5ec;
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            color: #000;
            font-size: 10px;
            font-weight: bold;
            box-shadow: 0 0 2px rgba(0,0,0,0.5);
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 32px;
            margin: 22px 0;
        }
        .stat-item { text-align: center; }
        .stat-val { font-size: 17px; font-weight: 700; display: block; }
        .stat-label { font-size: 13px; color: #86878b; margin-top: 2px; }

        /* Buttons */
        .edit-row { display: flex; gap: 6px; }
        .btn-black {
            background: #252525;
            color: white;
            padding: 8px 18px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
        }

        .bio-text {
            font-size: 14px;
            text-align: center;
            padding: 15px 40px;
            line-height: 1.4;
            color: white;
        }

        /* Icons Tray */
        .icons-tray {
            display: flex;
            width: 100%;
            justify-content: space-around;
            border-top: 0.5px solid #222;
            padding: 12px 0;
            margin-top: 10px;
        }
        .icons-tray svg { width: 22px; height: 22px; fill: #86878b; }
        .active-icon svg { fill: white; border-bottom: 2px solid white; padding-bottom: 30px; margin-bottom: -15px; }

        /* Feed Area */
        .feed-placeholder {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-bottom: 100px;
        }
        .circle-icon {
            width: 70px; height: 70px;
            border: 2px solid #252525;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 15px;
        }
        .create-pink {
            background: #fe2c55;
            color: white;
            padding: 10px 60px;
            border-radius: 2px;
            font-weight: 700;
            font-size: 15px;
            margin-top: 20px;
            border: none;
        }

        /* --- THE TRIGGER PANEL --- */
        .bottom-setup {
            background: #121212;
            padding: 20px;
            border-top: 1px solid #333;
            z-index: 100;
        }
        .bottom-setup input {
            width: 100%; background: #222; border: 0.5px solid #444;
            padding: 12px; color: white; border-radius: 4px; margin-bottom: 10px; outline: none;
        }

        /* --- LOADING OVERLAY --- */
        .loading-ov {
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 500; flex-direction: column; justify-content: center; align-items: center;
        }
        .loader-ring {
            width: 45px; height: 45px; border: 3px solid #333;
            border-top: 3px solid #20d5ec; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="status-bar">
            <span>10:24</span>
            <div style="display: flex; gap: 5px;">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="white"><path d="M21 16.5c0 .38-.21.71-.53.88l-7.97 4.25c-.31.17-.69.17-1 0L3.53 17.38c-.32-.17-.53-.5-.53-.88V7.5c0-.38.21-.71.53-.88l7.97-4.25c.31-.17.69-.17 1 0l7.97 4.25c.32.17.53.5.53.88v9z"/></svg>
                <span style="color: #fce100;">88%</span>
            </div>
        </div>

        <div class="header">
            <svg viewBox="0 0 48 48"><path d="M34 12l-2.82 2.82L39.34 22H8v4h31.34l-8.16 8.16L34 37l13-13-13-13z"/></svg>
            <span style="font-weight: 700;">Profile</span>
            <svg viewBox="0 0 48 48"><path d="M6 36h36v-4H6v4zm0-10h36v-4H6v4zm0-14v4h36v-4H6z"/></svg>
        </div>

        <div class="profile-area">
            <div class="avatar-container">
                <img src="https://via.placeholder.com/150" class="avatar">
                <div class="blue-plus">+</div>
            </div>
            <div class="name-container">
                <span class="display-name" id="p-name">Jessica</span>
                <div class="verified-badge" id="v-check">✓</div>
            </div>
            <span class="username" id="p-handle">@snaptrickspro</span>

            <div class="stats-bar">
                <div class="stat-item"><span class="stat-val">26</span><span class="stat-label">Following</span></div>
                <div class="stat-item"><span class="stat-num">2</span><span class="stat-label">Followers</span></div>
                <div class="stat-item"><span class="stat-num">14</span><span class="stat-label">Likes</span></div>
            </div>

            <div class="edit-row">
                <div class="btn-black">Edit profile</div>
                <div class="btn-black">Add friends</div>
            </div>

            <div class="bio-text">Expert tutorials for Snapchat tips and security.<br>Follow for more!</div>
        </div>

        <div class="icons-tray">
            <div class="active-icon"><svg viewBox="0 0 48 48"><path d="M6 10h36v4H6zm0 10h36v4H6zm0 10h36v4H6z"/></svg></div>
            <div><svg viewBox="0 0 48 48"><path d="M36 16H12v20h24V16zm-12 5l8 10H16l8-10z"/></svg></div>
            <div><svg viewBox="0 0 48 48"><path d="M34 6H14c-2.21 0-3.99 1.79-3.99 4L10 42l14-6 14 6V10c0-2.21-1.79-4-4-4z"/></svg></div>
        </div>

        <div class="feed-placeholder">
            <div class="circle-icon">
                <svg viewBox="0 0 48 48" style="width: 40px; fill: #333;"><path d="M24 4C12.95 4 4 12.95 4 24s8.95 20 20 20 20-8.95 20-20S35.05 4 24 4zm0 36c-8.82 0-16-7.18-16-16S15.18 8 24 8s16 7.18 16 16-7.18 16-16 16z"/></svg>
            </div>
            <p style="font-weight: 700; font-size: 16px;">Create your AI Self</p>
            <p style="font-size: 13px; color: #86878b; margin-top: 8px;">Videos your AI Self is cast in will appear here.</p>
            <button class="create-pink">Create</button>
        </div>

        <div class="bottom-setup" id="setup">
            <input type="text" id="in-name" placeholder="Name (Jessica)">
            <input type="text" id="in-user" placeholder="Username (@user)">
            <button class="create-pink" style="width: 100%; margin:0;" onclick="start()">Verify Official Account</button>
        </div>

        <div class="loading-ov" id="loader">
            <div class="loader-ring"></div>
            <p id="l-pct" style="font-size: 28px; font-weight: 900;">0%</p>
        </div>
    </div>

    <script>
        function start() {
            const name = document.getElementById('in-name').value || "Jessica";
            const user = document.getElementById('in-user').value || "@snaptrickspro";

            document.getElementById('p-name').innerText = name;
            document.getElementById('p-handle').innerText = user.startsWith('@') ? user : '@' + user;

            document.getElementById('setup').style.display = 'none';
            document.getElementById('loader').style.display = 'flex';

            let p = 0;
            const t = setInterval(() => {
                p += Math.floor(Math.random() * 5) + 2;
                if(p >= 100) {
                    p = 100;
                    clearInterval(t);
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('v-check').style.display = 'flex';
                    }, 800);
                }
                document.getElementById('l-pct').innerText = p + "%";
            }, 100);
        }
    </script>
</body>
</html>
