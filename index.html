<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Profile Verification Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: white; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }

        /* --- 1. Background TikTok Profile --- */
        .tiktok-profile {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: #000;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            filter: blur(0px);
            transition: filter 0.5s;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #333;
            background-image: url('https://via.placeholder.com/100'); /* Dir hna link d l-tswira dyalk */
            background-size: cover;
            margin-bottom: 15px;
        }

        .username-container { display: flex; align-items: center; gap: 5px; }
        .username { font-size: 20px; font-weight: bold; }
        
        /* Verified Badge (Hidden at start) */
        .verified-badge {
            width: 18px;
            height: 18px;
            background: #20d5ec;
            border-radius: 50%;
            display: none; /* Hidden */
            justify-content: center;
            align-items: center;
            font-size: 10px;
            color: black;
            font-weight: bold;
        }

        .stats { display: flex; gap: 20px; margin: 20px 0; }
        .stat-item { text-align: center; }
        .stat-val { font-weight: bold; display: block; }
        .stat-label { font-size: 12px; color: #888; }

        .bio { font-size: 14px; color: #ccc; margin-bottom: 20px; }

        /* --- 2. Verification Tool Overlay --- */
        .overlay {
            position: absolute;
            width: 400px;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            z-index: 10;
        }

        .window-header { position: absolute; top: 10px; left: 15px; font-size: 11px; color: #555; }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #fe2c55;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .success-icon {
            width: 50px;
            height: 50px;
            background: #2ecc71;
            border-radius: 50%;
            display: none;
            margin: 20px auto;
            line-height: 50px;
            font-size: 25px;
        }

        #status-text { margin-bottom: 10px; font-size: 16px; }
    </style>
</head>
<body>

    <div class="tiktok-profile" id="profile">
        <div class="profile-pic"></div>
        <div class="username-container">
            <span class="username">@user_name</span>
            <div class="verified-badge" id="blue-check">✓</div>
        </div>
        
        <div class="stats">
            <div class="stat-item"><span class="stat-val">150</span><span class="stat-label">Following</span></div>
            <div class="stat-item"><span class="stat-val">14K</span><span class="stat-label">Followers</span></div>
            <div class="stat-item"><span class="stat-val">250K</span><span class="stat-label">Likes</span></div>
        </div>
        <div class="bio">No bio yet.</div>
    </div>

    <div class="overlay" id="tool-window">
        <div class="window-header">Venix Verification Tool</div>
        <div id="loader-content">
            <h3 id="status-text">Processing @user_name...</h3>
            <div class="spinner"></div>
            <p id="percent">0%</p>
        </div>

        <div id="success-content" style="display: none;">
            <div class="success-icon">✓</div>
            <h3>Account Verified!</h3>
        </div>
    </div>

    <script>
        const percentEl = document.getElementById('percent');
        const blueCheck = document.getElementById('blue-check');
        const toolWindow = document.getElementById('tool-window');
        const profile = document.getElementById('profile');
        const loaderContent = document.getElementById('loader-content');
        const successContent = document.getElementById('success-content');

        let count = 0;

        // Animation d'enregistrement
        const interval = setInterval(() => {
            count += Math.floor(Math.random() * 5) + 2;
            if (count >= 100) {
                count = 100;
                clearInterval(interval);
                completeProcess();
            }
            percentEl.innerText = count + "%";
        }, 100);

        function completeProcess() {
            // 1. Hide loader
            loaderContent.style.display = 'none';
            // 2. Show Success
            successContent.style.display = 'block';
            successContent.querySelector('.success-icon').style.display = 'block';
            
            // 3. Ba3d 1.5 thanya, t-hayed l-window w tle3 l-verif f l-profile
            setTimeout(() => {
                toolWindow.style.display = 'none'; // Window t-mchi
                blueCheck.style.display = 'flex'; // Blue badge tle3
                profile.style.filter = 'none';
            }, 2000);
        }

        // Blur background f-lowel
        profile.style.filter = 'blur(3px)';
    </script>
</body>
</html>
